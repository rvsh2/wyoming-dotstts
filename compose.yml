services:
  wyoming-dotstts:
    build: .
    container_name: wyoming-dotstts
    restart: unless-stopped
    env_file:
      - .env
    # Mirrors the Dockerfile CMD. Streaming is safe here: with
    # DOTSTTS_OPTIMIZE=1 (torch.compile) synthesis runs at RTF ~0.6 on an
    # RTX 3090, so generation stays ahead of playback. If you disable
    # optimize, add --no-streaming back or speech will stutter.
    command:
      - python
      - -m
      - dotstts_wyoming
      - --uri
      - tcp://0.0.0.0:10201
      - --speaker-dir
      - /data/speakers
      - --model-dir
      - /data/models
      - --http-host
      - 0.0.0.0
      - --http-port
      - "8180"
    ports:
      - "0.0.0.0:10201:10201"
      # Management/debug HTTP API. Exposed on the LAN for the Home Assistant
      # custom integration; protected by DOTSTTS_API_TOKEN (set in .env).
      - "0.0.0.0:8180:8180"
    networks:
      - bridge-network
    volumes:
      # Whole /data is a mount so runtime settings (/data/settings.json)
      # survive container recreation, not just restarts.
      - ./data:/data
    # Probe both the Wyoming port and the HTTP API. `restart: unless-stopped`
    # only covers crashes, not hangs, and Docker does not restart unhealthy
    # containers by itself — so after 3 consecutive failures the check sends
    # SIGINT to PID 1 (Python always handles it; SIGTERM from inside the
    # container would be dropped for PID 1), the server exits cleanly and the
    # restart policy brings it back. The kill only fires once the server has
    # been healthy at least once (/tmp/hc_ok): start_period does NOT stop the
    # test from running, so killing unconditionally would abort model loading
    # in a loop. The marker is cleared on kill to re-arm the grace period.
    healthcheck:
      test:
        - CMD-SHELL
        - >
          python -c "import socket,urllib.request;
          socket.create_connection(('127.0.0.1',10201),5).close();
          urllib.request.urlopen('http://127.0.0.1:8180/health',timeout=10)"
          && { touch /tmp/hc_ok; rm -f /tmp/hc_fails; }
          || { if [ -f /tmp/hc_ok ]; then
          n=$$(( $$(cat /tmp/hc_fails 2>/dev/null || echo 0) + 1 ));
          echo $$n > /tmp/hc_fails;
          if [ $$n -ge 3 ]; then rm -f /tmp/hc_ok /tmp/hc_fails; kill -INT 1; fi;
          fi; exit 1; }
      interval: 30s
      timeout: 20s
      retries: 3
      # Model load + warmup can take a few minutes on a cold start.
      start_period: 600s
    deploy:
      resources:
        reservations:
          devices:
            # Pinned to GPU1 to balance speech load off GPU0 (transcribe stays on
            # GPU0), giving the LLM even headroom across both cards.
            - driver: nvidia
              device_ids: ['1']
              capabilities: [ gpu ]

networks:
  bridge-network:
    external: true
